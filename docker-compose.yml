version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: food_delivery_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: food_delivery_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql   # auto-runs on first start

  api:
    build: .
    container_name: food_delivery_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data:
